<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Withdraw - AgroPulse</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="top-brand">
        <div class="brand-title">Withdraw</div>
        <div class="spacer"></div>
        <a class="btn btn-ghost" href="dashboard.html">Back</a>
      </header>

      <main class="content">
        <section class="card">
          <h2 class="card-h2">Request Withdrawal</h2>
          <p class="muted">Requests are saved as pending and require admin approval.</p>

          <form id="withdrawForm" class="form-grid">
            <div class="field">
              <label class="field-label">Amount</label>
              <input class="input" name="amount" type="number" min="1" step="1" required />
            </div>
            <div class="field">
              <label class="field-label">MTN MoMo Number</label>
              <input class="input" name="momoNumber" type="text" placeholder="054xxxxxxx" required />
            </div>
            <button class="btn btn-primary btn-full" type="submit">Submit Request</button>
            <div id="withdrawError" class="alert alert-error" hidden></div>
          </form>
        </section>
      </main>
    </div>

    <script src="assets/auth.js"></script>
    <script src="assets/withdrawal.js"></script>
  </body>
</html>
