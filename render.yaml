# Render Blueprint — https://render.com/docs/blueprint-spec
# After connecting this repo, Render can apply this file (or use it as reference for manual setup).

services:
  - type: web
    name: agropulse
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: JWT_EXPIRES_IN
        value: 7d
      # Set these in the Render dashboard (do not commit real secrets):
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      # Optional — set after first deploy when you know your public URL:
      - key: CLIENT_ORIGIN
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_CALLBACK_URL
        sync: false
