<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard - AgroPulse</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="top-brand">
        <div class="brand-mark" aria-hidden="true">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M12 2C8 6 7 10 7 13C7 17 10 22 12 22C14 22 17 17 17 13C17 10 16 6 12 2Z"
              fill="currentColor"
              opacity="0.9"
            />
            <path
              d="M8 14C10 12 12 11 16 10"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linecap="round"
            />
          </svg>
        </div>
        <div class="brand-title">AgroPulse</div>
        <div class="spacer"></div>
        <a class="btn btn-ghost" href="login.html" id="logoutLink">Log Out</a>
      </header>

      <main class="content">
        <section class="card">
          <h2 class="card-h2">Your Dashboard</h2>
          <div class="grid-2">
            <div class="stat">
              <div class="stat-label">Balance</div>
              <div class="stat-value" id="balanceValue">0</div>
            </div>
            <div class="stat">
              <div class="stat-label">Total Deposits</div>
              <div class="stat-value" id="depositsValue">0</div>
            </div>
            <div class="stat">
              <div class="stat-label">Total Withdrawals</div>
              <div class="stat-value" id="withdrawalsValue">0</div>
            </div>
            <div class="stat">
              <div class="stat-label">User</div>
              <div class="stat-value" id="userEmail">-</div>
            </div>
          </div>
        </section>

        <section class="card">
          <h2 class="card-h2">Actions</h2>
          <div class="cta-row">
            <a class="btn btn-primary" href="deposit.html">Deposit</a>
            <a class="btn btn-ghost" href="withdrawal.html">Withdraw</a>
          </div>
          <p class="muted">Admin tools will be available on the admin page after you’re approved.</p>
          <div class="cta-row" style="margin-top: 12px;">
            <a class="btn btn-ghost" href="admin.html">Admin Panel</a>
          </div>
        </section>
      </main>
    </div>

    <script src="assets/auth.js"></script>
    <script src="assets/dashboard.js"></script>
  </body>
</html>
