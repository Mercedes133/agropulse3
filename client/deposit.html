<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Deposit - AgroPulse</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="top-brand">
        <div class="brand-title">Deposit</div>
        <div class="spacer"></div>
        <a class="btn btn-ghost" href="dashboard.html">Back</a>
      </header>

      <main class="content">
        <section class="card">
          <h2 class="card-h2">Paystack Deposit</h2>
          <p class="muted">You will only be credited after backend verification.</p>

          <form id="depositForm" class="form-grid">
            <div class="field">
              <label class="field-label">Amount</label>
              <input class="input" name="amount" type="number" min="1" step="1" required />
            </div>
            <button class="btn btn-primary btn-full" type="submit">Continue Payment</button>
            <div id="depositError" class="alert alert-error" hidden></div>
          </form>
        </section>

        <section class="card" style="margin-top: 14px;">
          <h2 class="card-h2">Manual Payment (MTN MoMo)</h2>
          <p class="muted">Prefer to pay manually? Submit for admin approval.</p>
          <div class="cta-row" style="margin-top: 10px;">
            <a class="btn btn-ghost" href="manual-payment.html">Manual Payment</a>
          </div>
        </section>
      </main>
    </div>

    <script src="assets/auth.js"></script>
    <script src="assets/deposit.js"></script>
  </body>
</html>
